# @package _global_
defaults:
  - _self_
  - hydra: default
  - experiment/pairing: with_self
  - experiment/communication_style: sequential
  - experiment/condition: single_module
  - experiment/players: default

  - experiment: null

  - override hydra/job_logging: none
  - override hydra/hydra_logging: none

task_name: generate_experiments

seeds_per_condition:
  single_module: 3
  repeated_modules_2: 3
  repeated_modules_5: 3
  multiple_modules_2_front: 1
  multiple_modules_2: 1
  multiple_modules_n: 8

pairing_generator:
  _target_: gptnt.ktane.experiments.pairing.PairingGenerator
  pairing_type: ???
  all_players: ???

mission_generator:
  _target_: gptnt.ktane.experiments.missions.MissionGenerator
  num_seeds_per_mission: ${seeds_per_condition.${experiment_generator.condition}}
  seed: 34
  config: ???

experiment_generator:
  _target_: gptnt.ktane.experiments.experiments.ExperimentGenerator
  condition: ???
  communication_style: ???
