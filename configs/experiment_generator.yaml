# @package _global_

defaults:
  - _self_
  - hydra: default

  - experiment/mission_condition: single_module
  - experiment/communication_style: sync
  - experiment/pairing: no_expert

  - experiment/player_specs@defuser_protocol: solo_defuser
  - experiment/player_specs@expert_protocol: none

  - experiment: null

  - override hydra/job_logging: none
  - override hydra/hydra_logging: none

task_name: generate_experiments

# list of players to generate experiments for
players:
  all:
    - gpt5
    # - claude45
    - gemini-3
    - internvl35
    - qwen3vl
  best_expert: gemini-3
  best_defuser: gemini-3

defuser_protocol: ???
expert_protocol: ???
communication_style: ???

mission_generator:
  _target_: gptnt.experiments.missions.MissionGenerator
  seed: 10
  num_seeds_per_mission: ???
  config: ???

experiment_generator:
  _target_: gptnt.experiments.experiments.ExperimentGenerator
  condition: ???
  defuser_protocol: ${defuser_protocol}
  expert_protocol: ${expert_protocol}

pairing_generator:
  _target_: gptnt.experiments.pairing.PairingGenerator
  pairing_type: ???
  best_model: null
  all_players: ${players.all}
