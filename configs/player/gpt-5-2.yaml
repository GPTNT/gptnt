# @package player

defaults:
  - _self_

identity:
  display_name: GPT-5.2
  organisation: OpenAI
  is_os_model: false
  url: https://platform.openai.com/docs/models/gpt-5.2

capabilities:
  player_name: gpt-5-2
  tokens_per_image: 383
  structured_output_mode: null
  thinking_method: thinking-out-loud
  include_schema_in_instructions: true
  interaction_location_method: set-of-marks
  usage_limits:
    input_tokens_limit: 400000
    output_tokens_limit: 128000

action_predictor:
  agent:
    model:
      _target_: pydantic_ai.models.openai.OpenAIChatModel
      model_name: gpt-5.2

    # gpt-5.2 always reasons, so its reasoning cannot be turned off; `minimal` maps to
    # reasoning_effort=minimal, the lowest setting.
    model_settings:
      thinking: minimal
