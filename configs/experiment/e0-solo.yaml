# @package _global_

defaults:
  - override /experiment/mission_condition: single_module
  - override /experiment/communication_style: sync
  - override /experiment/pairing: no_expert
  - override /experiment/player_specs@defuser_protocol: solo_player
  - override /experiment/player_specs@expert_protocol: none

  - _self_

players:
  all:
    - test-defuser

mission_generator:
  config:
    _target_: gptnt.core.experiments.missions.MissionGeneratorConfig
    time_limit: 60
    allow_back_placement: false

    n_modules_min: 1
    n_modules_max: 1
    sample_from_modules: false
    allow_repeat_module: false

    min_optional_widgets: 1
    max_optional_widgets: 5
