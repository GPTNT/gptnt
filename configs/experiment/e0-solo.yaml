# @package _global_

defaults:
  - override /mission_condition: single_module
  - override /communication_style: sync
  - override /pairing: no_expert
  - override /players: test_defuser
  - override /think_framework: act
  - override /player_specs@defuser_protocol: solo_player
  - override /player_specs@expert_protocol: none

  - _self_

mission_generator:
  config:
    _target_: gptnt.experiments.missions.MissionGeneratorConfig
    time_limit: 60
    allow_back_placement: false

    n_modules_min: 1
    n_modules_max: 1
    sample_from_modules: false
    allow_repeat_module: false

    min_optional_widgets: 1
    max_optional_widgets: 5
