# @package _global_

defaults:
  - override /experiment/mission_condition: single_module
  - override /experiment/communication_style: sync
  - override /experiment/pairing: with_best_defuser
  - override /experiment/player_specs@defuser_protocol: defuser
  - override /experiment/player_specs@expert_protocol: expert
  - _self_

players:
  all:
    - test-defuser
    - test-expert

pairing_generator:
  pairing_type: with_best_defuser
  best_model: test-defuser

mission_generator:
  config:
    time_limit: 60
