# @package _global_

defaults:
  - override /experiment/mission_condition: multiple_modules_n
  - override /experiment/communication_style: sync
  - override /experiment/pairing: no_expert
  - override /experiment/player_specs@defuser_protocol: solo_oracle
  - override /experiment/player_specs@expert_protocol: none

  - _self_

players:
  - test-oracle

mission_generator:
  config:
    _target_: gptnt.experiments.missions.MissionGeneratorConfig
    time_limit: 60
    allow_back_placement: true

    n_modules_min: 5
    n_modules_max: 5
    sample_from_modules: true
    allow_repeat_module: false

    min_optional_widgets: 1
    max_optional_widgets: 5
