# @package _global_

defaults:
  - override /mission_condition: single_module
  - override /communication_style: sync
  - override /player_specs@defuser_protocol: solo_player
  - override /player_specs@expert_protocol: none
  - override /pairing: no_expert
  - _self_

mission_generator:
  config:
    excluded_modules:
      - Empty
      - Timer
      - NeedyVentGas
      - NeedyCapacitor
      - NeedyKnob
      - Simon
      - Morse
