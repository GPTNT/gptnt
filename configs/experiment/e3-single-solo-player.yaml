# @package _global_

defaults:
  - override /experiment/mission_condition: single_module
  - override /experiment/communication_style: sync
  - override /experiment/pairing: no_expert
  - override /experiment/player_specs@defuser_protocol: solo_player
  - override /experiment/player_specs@expert_protocol: none
  - _self_

mission_generator:
  config:
    excluded_modules:
      - Empty
      - Timer
      - NeedyVentGas
      - NeedyCapacitor
      - NeedyKnob
