# @package _global_

defaults:
  - _self_
  - hydra: default

  - player: test-defuser
  - player/provider: null

  - override hydra/job_logging: none
  - override hydra/hydra_logging: none

task_name: evaluation

player:
  _target_: gptnt.interactive.services.player.service.PlayerService
  _partial_: true

  redis:
    _recursive_: false

  nobf_generator:
    _target_: gptnt.players.feedback.nobf.NaughtyOutputBehaviourFeedbackGenerator

  capabilities:
    _target_: gptnt.specification.PlayerCapabilities
    player_type: ai
    player_name: ???
    structured_output_mode: ???
    thinking_method: ???
    interaction_location_method: ???
    preserve_last_frame_for_n_turns: 1
    enable_nobf_generation: true
    usage_limits:
      _target_: pydantic_ai.usage.UsageLimits

  # Records to disk by default (no Weights & Biases needed). To also log to W&B, install the
  # wandb extra (`uv sync --group wandb` / `pip install gptnt-interactive[wandb]`) and swap
  # _target_ to gptnt.experiments.recorder.wandb.WandbExperimentPlayerRecorder (it accepts the same
  # capabilities, plus an optional wandb_init_kwargs); W&B target comes from the WANDB_* env.
  experiment_recorder:
    _target_: gptnt.experiments.recorder.local.ExperimentPlayerRecorder
    capabilities: ${player.capabilities}

  action_predictor:
    _target_: gptnt.players.action_predictor.ActionPredictor
    capabilities: ${player.capabilities}
    agent:
      _target_: pydantic_ai.Agent

      retries: 0

      # Keep v1 behaviour: a function tool requested alongside a successful output tool is skipped,
      # not run. pydantic-ai v2 defaults this to "graceful" (run it); we score the output only.
      end_strategy: early

      model: ???

      model_settings:
        _target_: pydantic_ai.settings.ModelSettings
        _convert_: all
        max_tokens: 1000
        temperature: 0.6

  observation_handler:
    _target_: gptnt.players.observation_handler.ObservationHandler
    interaction_location_method: ${player.capabilities.interaction_location_method}

    image_resizer:
      _target_: gptnt.processors.image_resizer.ImageResizer
      target_width: ${oc.decode:${oc.env:KTANE_GAME_WIDTH,"640"}}
      target_height: ${oc.decode:${oc.env:KTANE_GAME_HEIGHT,"480"}}
    set_of_marks_painter:
      _target_: gptnt.processors.set_of_marks.SetOfMarksHandler
      add_labels: true
      add_mask_outline: true
      mark_type: alphabet
      annotation_text_params:
        _target_: gptnt.processors.labels.drawing.AnnotationTextParams
        font: 2
        font_scale: 0.7
        thickness: 1
        space_between_boxes: 2
      annotation_background_params:
        _target_: gptnt.processors.labels.drawing.AnnotationBackgroundParams
        padding: 3
        alpha: 1
      mask_drawing_params:
        _target_: gptnt.processors.set_of_marks.MaskDrawingParams
        mask_thickness: 1
        soft_mask_alpha: 0.1
        bw_outside_mask: False
        # In pixels, or null
        mask_highlight_size: null
