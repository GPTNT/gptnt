# @package player

defaults:
  - _self_

capabilities:
  player_name: claude-sonnet-4-6
  structured_output_mode: null
  thinking_method: thinking-out-loud
  include_schema_in_instructions: true
  interaction_location_method: set-of-marks
  usage_limits:
    input_tokens_limit: 200000
    output_tokens_limit: 64000

action_predictor:
  agent:
    model:
      _target_: pydantic_ai.models.anthropic.AnthropicModel
      model_name: claude-sonnet-4-6

    # Disable the model's own reasoning. GPTNT scores ReAct-style reasoning in the message. `false`
    # is omitted for Anthropic, which leaves claude-sonnet-4-6 at its default (no thinking).
    model_settings:
      thinking: false
