# @package player

defaults:
  - _self_

capabilities:
  player_name: internvl35-38b
  use_structured_outputs: true
  structured_output_mode: prompted
  image_dimensions:
    _target_: gptnt.common.image_ops.ImageDimensions
    width: 448
    height: 448

action_predictor:
  agent:
    model:
      _target_: pydantic_ai.models.openai.OpenAIChatModel
      model_name: OpenGVLab/InternVL3_5-38B
      provider:
        _target_: pydantic_ai.providers.openai.OpenAIProvider
        base_url: https://box2.gptnt.space/v1
    model_settings:
      _target_: pydantic_ai.models.openai.OpenAIChatModelSettings
      _convert_: all
      max_tokens: 1000
      temperature: 0.6 # Recommended for thinking

observation_handler:
  image_resizer:
    _target_: gptnt.processors.image_resizer.ImageResizer
    target_width: ${player.capabilities.image_dimensions.width}
    target_height: ${player.capabilities.image_dimensions.height}
