# @package player

defaults:
  - _self_

capabilities:
  player_name: qwen3vl-32b
  use_structured_outputs: true
  structured_output_mode: tool
  desired_image_dimensions:
    _target_: gptnt.common.image_ops.ImageDimensions
    width: 504
    height: 504

action_predictor:
  agent:
    model:
      _target_: pydantic_ai.models.openai.OpenAIResponsesModel
      model_name: Qwen/Qwen3-VL-32B-Instruct
      provider:
        _target_: pydantic_ai.providers.openai.OpenAIProvider
        base_url: http://localhost:11434/v1
    model_settings:
      _target_: pydantic_ai.models.openai.OpenAIResponsesModelSettings
      _convert_: all
      max_tokens: 1000

observation_handler:
  image_resizer:
    _target_: gptnt.processors.image_resizer.ImageResizer
    target_width: ${player.capabilities.desired_image_dimensions.width}
    target_height: ${player.capabilities.desired_image_dimensions.height}
