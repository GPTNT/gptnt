# @package _global_

defaults:
  - _self_
  - anchors
  - hydra: default

  - suites: ???

  - override hydra/job_logging: none
  - override hydra/hydra_logging: none

task_name: generate_experiments

# Placeholder roster. The real players come from the run.yaml; the gate and ad-hoc generation
