receivers:
  filelog/ktane:
    include:
      - /var/log/unity/ktane.log # Path inside the container
      - ./storage/ktane/logs/ktane.log # Path outside container
    start_at: end # Only tail new logs (change to 'beginning' to read all)
    include_file_path: true
    include_file_name: true
    poll_interval: 500ms # Check for new logs every 500ms

    # Handle multiline logs (when DEBUG/INFO lines have continuation)
    multiline:
      line_start_pattern: '^\s*(DEBUG|INFO|WARN|ERROR|FATAL)\s+'

    resource:
      service.name: "ktane"
      sampling.aggressive: "true"

    operators:
      # Parse the log4net format
      - type: regex_parser
        # Regex breakdown:
        # ^\s*                       : Start of line, optional leading whitespace
        # (?P<level>\w+)             : Log level (e.g., DEBUG, INFO, WARN, ERROR, FATAL)
        # \s+                        : Whitespace separator
        # (?P<timestamp>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2},\d{3})
        #                            : Timestamp in 'YYYY-MM-DD HH:MM:SS,mmm' format
        # \s+                        : Whitespace separator
        # \[(?P<logger>[^\]]+)\]     : Logger name inside square brackets
        # \s+                        : Whitespace separator
        # (?:\s+\[(?P<session_id>[^\]]+)\])?
        #                            : Optional session ID inside square brackets
        # \s+                        : Whitespace separator
        # trace_id=(?P<trace_id>\S*) : trace_id= followed by trace ID (or "" if not set)
        # \s+                        : Whitespace separator
        # span_id=(?P<span_id>\S*)   : span_id= followed by span ID (or "" if not set)
        # \s+                        : Whitespace separator
        # (?P<message>(?s:.*))       : The rest of the line as the log message (including newlines)
        regex: '^\s*(?P<level>\w+)\s+(?P<timestamp>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2},\d{3})\s+\[(?P<logger>[^\]]+)\](?:\s+\[(?P<session_id>[^\]]+)\])?\s+(?:trace_id=(?P<trace_id>\S+)\s+span_id=(?P<span_id>\S+)\s+)?(?P<message>(?s:.*))$'
        timestamp:
          parse_from: attributes.timestamp
          layout: "%Y-%m-%d %H:%M:%S,%L"
          location: UTC
        severity:
          parse_from: attributes.level
          mapping:
            debug: DEBUG
            info: INFO
            warn: WARN
            error: ERROR
            fatal: FATAL

        # If regex doesn't match, still accept the line
        on_error: send

      # Link log to traces
      - type: trace_parser
        if: 'attributes.trace_id != nil and attributes.trace_id != ""'
        trace_id:
          parse_from: attributes.trace_id
        span_id:
          parse_from: attributes.span_id

      # Add structured attributes
      - type: add
        field: attributes.logger_name
        value: EXPR(attributes.logger)

      # Move message to body
      - type: move
        from: attributes.message
        to: body

  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
        max_recv_msg_size_mib: 32 # 32MiB
      http:
        endpoint: "0.0.0.0:4318"
        # 32MiB to match above
        max_request_body_size: 33554432

processors:
  # ── Ktane noise filter (ALWAYS active)
  filter/logs/ktane:
    error_mode: ignore
    logs:
      log_record:
        # Drop specific noisy loggers
        - 'attributes["logger"] == "Localization"'
        - 'attributes["logger"] == "RecordManager"'
        - 'attributes["logger"] == "LeaderboardBulkSubmissionWorker"'
        - 'attributes["logger"] == "KTInputManager"'
        - 'attributes["logger"] == "OSXPlatformUtil"'
        - 'attributes["logger"] == "ProgressionManager"'
        - 'attributes["logger"] == "PlayerSettingsManager"'
        - 'attributes["logger"] == "BombRules"'
        - 'attributes["logger"] == "Rules"'
        - 'attributes["logger"] == "SecondScreenInteractiveManual"'
        - 'attributes["logger"] == "ServicesSteam"'
        - 'attributes["logger"] == "UserManager"'
        - 'attributes["logger"] == "DemoManager"'
        - 'attributes["logger"] == "FileUtilityHelper"'
        - 'attributes["logger"] == "TournamentManager"'
        - 'attributes["logger"] == "StatsManager"'
        - 'attributes["logger"] == "MaterialOverride"'
        - 'attributes["logger"] == "PrefabOverride"'
        - 'attributes["logger"] == "MorseCodeRuleSetGenerator"'
        - 'attributes["logger"] == "SecondScreenManager"'
        - 'attributes["logger"] == "ModManager"'
        - 'attributes["logger"] == "MissionManager"'
        - 'attributes["logger"] == "AbstractPlatformUtil"'
        - 'attributes["logger"] == "MainThreadQueue"'
        - 'attributes["logger"] == "State"' # This is the State coming from the game not the mod
        - 'attributes["logger"] == "PaceMaker"'

        # Drop health check logs
        - 'attributes["http.route"] == "/health"'

        # Drop messages matching patterns
        - 'IsMatch(body, "^Adding mod term:.*")'
        - 'IsMatch(body, "^Showing ToC.*")'
        - 'IsMatch(body, "^Loading AudioClips.*")'
        - 'IsMatch(body, "^Loading KMMission.*")'
        - 'IsMatch(body, "^Replacing shaders.*")'
        - 'IsMatch(body, "^ModUnityVersion.*")'
        - 'IsMatch(body, "^Loading \"mods.*")'
        - 'IsMatch(body, "^Loading assemblies.*")'
        - 'IsMatch(body, "^Could not write mod manual.*")'

        # Filter Twitch bomb is null (can come from GptntStates or Unity logger)
        - 'IsMatch(body, "Twitch bomb is null")'

        # Remove any logs regarding EmptyComponent
        - 'IsMatch(body, ".*EmptyComponent.*")'

        # Filter Unity ArgumentNullException
        - 'IsMatch(body, "ArgumentNullException: Argument cannot be null")'

        # Filter TwitchPlaySettings NullReferenceException (fires on every state change when TwitchPlays is not active)
        - 'IsMatch(body, "TwitchPlaySettings")'

        # Filter Unity missing-script warning on QueueRemoverObject
        - 'IsMatch(body, "QueueRemoverObject")'

  # ── Log severity filter (conditional)
  # Aggressive mode: drop below WARN
  # Debug mode:      keep everything
  filter/logs/severity:
    error_mode: ignore
    logs:
      log_record:
        - 'resource.attributes["sampling.aggressive"] == "true" and severity_number != SEVERITY_NUMBER_UNSPECIFIED and severity_number < SEVERITY_NUMBER_WARN'

  # ── Logfire log-span filter (conditional) ──────────────────────
  # Aggressive mode: drop logfire log-spans below WARN
  # Debug mode:      keep everything
  filter/traces/logfire_logs:
    error_mode: ignore
    traces:
      span:
        - |
          resource.attributes["sampling.aggressive"] == "true"
          and attributes["logfire.span_type"] == "log"
          and attributes["logfire.level_num"] < 13
          and not IsMatch(attributes["logfire.msg_template"],
            "^(Session starting|Session cleaned up)$")

  # ── Tail sampling (only reached in aggressive mode) ────────────
  tail_sampling:
    decision_wait: 660s
    num_traces: 70000
    expected_new_traces_per_sec: 100
    policies:
      - name: keep-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: sample-healthy
        type: probabilistic
        probabilistic:
          sampling_percentage: 0

  batch:
    timeout: 5s
    send_batch_size: 256
    send_batch_max_size: 512

  resource/mark_via_collector:
    attributes:
      - key: via.otel_collector
        value: "true"
        action: insert

  transform/promote_logfire_type:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(resource.attributes["logfire.span_type"], span.attributes["logfire.span_type"]) where span.attributes["logfire.span_type"] != nil

exporters:
  otlphttp/logfire:
    endpoint: "https://logfire-eu.pydantic.dev"
    headers:
      authorization: "Bearer ${env:LOGFIRE_TOKEN}"

    compression: gzip

  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

connectors:
  routing/traces:
    default_pipelines: [traces/direct] # No flag = debug mode = everything through
    error_mode: ignore
    table:
      # Log-type spans ALWAYS skip tail sampling
      - context: span
        condition: 'attributes["logfire.span_type"] == "log"'
        pipelines: [traces/direct]
      # Real traces → tail sampling when aggressive
      - context: resource
        condition: 'attributes["sampling.aggressive"] == "true"'
        pipelines: [traces/sampled]

service:
  pipelines:
    # ── Logs ───────────────────────────────────────────────────────
    logs:
      receivers: [filelog/ktane, otlp]
      processors: [
          resource/mark_via_collector,
          filter/logs/severity, # Conditional: drops < WARN only when aggressive
          filter/logs/ktane, # Always: drops ktane noise
          batch,
        ]
      exporters: [otlphttp/logfire]

    # ── Traces: entry point ────────────────────────────────────────
    traces/ingest:
      receivers: [otlp]
      processors: [
          filter/traces/logfire_logs, # Conditional: drops low-sev log-spans when aggressive
          transform/promote_logfire_type,
        ]
      exporters: [routing/traces]

    # ── Traces: direct export (debug mode + log-type spans) ───────
    traces/direct:
      receivers: [routing/traces]
      processors: [resource/mark_via_collector, batch]
      exporters: [otlphttp/logfire]

    # ── Traces: tail sampled (aggressive mode only) ───────────────
    traces/sampled:
      receivers: [routing/traces]
      processors: [tail_sampling, resource/mark_via_collector, batch]
      exporters: [otlphttp/logfire]

    # ── Metrics ────────────────────────────────────────────────────
    metrics:
      receivers: [otlp]
      processors: [resource/mark_via_collector, batch]
      exporters: [otlphttp/logfire]
