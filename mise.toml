[env]
# LOGFIRE_SEND_TO_LOGFIRE = "true"
LOGFIRE_PYDANTIC_PLUGIN_EXCLUDE = "google.genai.+"
OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:4318/"
COMPOSE_PROFILES = "prod"

[tasks.docs]
description = "Build the documentation site into site/"
run = "uv run zensical build --clean"

[tasks.docs-serve]
description = "Build and serve the documentation with live reload"
run = "uv run zensical serve"

[tasks.format]
description = "Format/lint all files in one go"
run = "uv run prek run -a"

[tasks.release]
description = "Cut a release: cz bump derives the next SemVer from commits, tags, and updates CHANGELOG.md. Preview with `mise run release -- --dry-run`."
run = "uv run cz bump"

[tasks.sync]
description = "Install dependencies"
run = "uv sync --all-groups"

[tasks.tests]
description = "Run all tests"
run = "uv run pytest"

[tools]
python = "3.13"
uv = "latest"
