[tasks.defuser]
description = "Run the defuser"
run = "uv run python src/gptnt/entrypoints/run_player.py model=test_defuser"

[tasks.em]
description = "Run the experiment-manager"
run = "uv run python src/gptnt/entrypoints/run_experiment_manager.py"

[tasks.expert]
description = "Run the expert"
run = "uv run python src/gptnt/entrypoints/run_player.py model=test_expert"

[tasks.format]
description = "Format/lint all files in one go"
run = "uv run pre-commit run -a"

[tasks.game]
description = "Run the game"
run = "uv run python src/gptnt/entrypoints/run_game_instance.py"

[tasks.install]
description = "Install dependencies"
alias = "i"
run = "uv sync --all-groups"

[tasks.kill-all]
description = "Kill all the GPTNT processes"
run = """
#!/usr/bin/env bash
ps -ax | grep python | grep gptnt/entrypoints | awk '{print $1}' | xargs kill -9
ps -ax | grep ktane | awk '{print $1}' | xargs kill -9
"""

[tasks.room]
description = "Run the room"
run = "uv run python src/gptnt/entrypoints/run_room_instance.py"

[tasks.tests]
description = "Run all tests"
run = "uv run pytest"

[tasks.together]
description = "Run things together"
run = """
#!/usr/bin/env bash
mise run em &
pid[0]=$!
mise run game &
pid[1]=$!
mise run room &
pid[2]=$!
trap "kill -9 ${pid[0]} ${pid[1]} ${pid[2]}; exit 1" INT
wait
"""

[tools]
python = "3.13"
uv = "latest"
