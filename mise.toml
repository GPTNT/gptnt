[env]
# LOGFIRE_SEND_TO_LOGFIRE = "true"
LOGFIRE_PYDANTIC_PLUGIN_EXCLUDE = "google.genai.+"
OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:4318/"
COMPOSE_PROFILES = "prod"

[tasks.format]
description = "Format/lint all files in one go"
run = "uv run prek run -a"

[tasks.release]
description = "Cut a release: auto-bump MAJOR.MINOR.PATCH from commits (see CONTRIBUTING.md). Dry-run by default; pass -- --apply"
run = "uv run python scripts/release.py"

[tasks.sync]
description = "Install dependencies"
run = "uv sync --all-groups"

[tasks.tests]
description = "Run all tests"
run = "uv run pytest"

[tools]
python = "3.13"
uv = "latest"
git-cliff = "latest"
