# YAML anchor for common otel-collector configuration
x-otel-common: &otel-common
  image: otel/opentelemetry-collector-contrib:latest
  network_mode: host
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
    interval: 30s
    timeout: 5s
    retries: 3

services:
  redis:
    image: redis:8
    container_name: redis
    network_mode: host
    volumes:
      - redis_data:/data
    command: redis-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    network_mode: host
    environment:
      # On host networking there is no docker DNS, so `redis` no longer resolves; use localhost.
      - REDIS_HOSTS=local:localhost:6379
    depends_on:
      - redis
    restart: unless-stopped

  otel-collector:
    <<: *otel-common
    profiles: ["prod"]
    container_name: otel-collector-prod
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./storage/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ./storage/ktane/logs:/var/log/unity:ro
    environment:
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}

  otel-collector-dev:
    <<: *otel-common
    profiles: ["dev"]
    container_name: otel-collector-dev
    command:
      - "--config=/etc/otel-collector-config.yaml"
      - "--config=/etc/otel-collector-config-nop.yaml"
    volumes:
      - ./storage/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ./storage/otel-collector-config-nop.yaml:/etc/otel-collector-config-nop.yaml:ro
      - ./storage/ktane/logs:/var/log/unity:ro
    environment:
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN:-disabled}

volumes:
  redis_data:
