# The headline suites: one model plays both roles across the multi-module set, sync and async.
#
#     gptnt doctor runs/headline.yaml      # validate structure + config names
#     gptnt generate runs/headline.yaml    # write specs
#     gptnt run runs/headline.yaml         # play and record
#
# Set `players` to the models you want to benchmark.

