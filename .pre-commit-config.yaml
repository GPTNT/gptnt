default_language_version:
  python: python3.13

# Only commit is installed by default: https://pre-commit.com/#pre-commit-install
# Pending rename of pre-push from: https://github.com/pre-commit/pre-commit/issues/2732
default_install_hook_types: ["commit-msg", "pre-commit"]

exclude: ^scripts/(throw|stress_test)\.sh$

repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.10.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
  #   rev: "3.0.3"
  #   hooks:
  #     - id: editorconfig-checker

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        priority: 0
      - id: check-vcs-permalinks
        priority: 0
      - id: detect-private-key
        priority: 0
      - id: check-case-conflict
        priority: 0
      - id: check-symlinks
        priority: 0
      - id: destroyed-symlinks
        priority: 0
      - id: check-toml
        priority: 0
      - id: check-yaml
        args: [--allow-multiple-documents]
        priority: 0
      - id: debug-statements
        types: [python]
        priority: 0
      - id: check-illegal-windows-names
        priority: 0
      - id: end-of-file-fixer
        types: [text]
      - id: name-tests-test
        args: [--pytest-test-first]
        priority: 0
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        types: [text]
      - id: mixed-line-ending
      - id: fix-byte-order-marker

  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.35.0
    hooks:
      - id: check-github-workflows
        types: [yaml]
        priority: 5

  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-smartquotes

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        priority: 0

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt

  - repo: https://github.com/pappasam/toml-sort
    rev: "v0.24.3"
    hooks:
      - id: toml-sort
        args: [--in-place]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.7.4
    hooks:
      - id: prettier
        types_or: [html, javascript, yaml, json, markdown]
        exclude: storage/prompts/

  - repo: local
    hooks:
      - id: docformatter
        name: docformatter
        language: system
        entry: uv run docformatter --in-place --wrap-summaries=99 --wrap-descriptions=99
        types_or: [python, pyi, jupyter]

      - id: ruff-lint
        name: ruff linter
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        types_or: [python, pyi, jupyter]
        language: system

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        types_or: [python, pyi, jupyter]
        language: system

      - id: wemake-python-styleguide
        name: wemake-python-styleguide
        entry: uv run flake8
        types_or: [python, jupyter]
        language: system
        priority: 20

      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        types_or: [python, pyi, jupyter]
        language: system
        priority: 20
