[project]
name = "gptnt-records"
version = "1.0.0"
description = "GPTNT data layer: experiment records, recorder, and DuckDB persistence."
requires-python = ">=3.13, <3.14"
dependencies = [
    "gptnt-core",
    "case-converter>=1.2.0",
    "dill>=0.3.8",
    "duckdb>=1.4.4",
    "duckdb-engine>=0.17.0",
    "ijson>=3.5.0",
    "msgpack>=1.1.2",
    "pyarrow>=19.0.1",
    "typer>=0.15.1",
    "zstandard>=0.25.0",
]

[project.optional-dependencies]
# Optional: W&B run-logging recorder + run-management utilities. Records to disk without this.
wandb = ["wandb[media]>=0.19.9,<0.22.1"]

[tool.hatch.build.targets.wheel]
packages = ["src/gptnt"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
