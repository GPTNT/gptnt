[project]
name = "gptnt-app"
version = "1.0.0"
description = "GPTNT Streamlit analysis dashboard."
requires-python = ">=3.13, <3.14"
dependencies = [
    "gptnt-core",
    "gptnt-records",
    "case-converter>=1.2.0",
    "duckdb-engine>=0.17.0",
    "htbuilder>=0.9.0",
    "more-itertools>=10.7.0",
    "polars>=1.28.1",
    "st-tailwind>=1.3.0",
    "streamlit>=1.40.0",
    "streamlit-code-editor>=0.1.22",
]

[tool.hatch.build.targets.wheel]
packages = ["src/gptnt"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
