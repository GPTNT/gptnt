[project]
name = "gptnt-statics"
version = "1.0.0"
description = "GPTNT auxiliary static-task diagnostics: dataset generation + eval harness (VQA/grounding/OCR)."
requires-python = ">=3.13, <3.14"
dependencies = [
    "gptnt-core",
    "cyclopts>=4.8",
    "datasets>=3.6.0",
    "more-itertools>=10.7.0",
    "polars>=1.28.1",
    "sentence-transformers>=4.1.0",
]

[project.optional-dependencies]
# Optional: upload predictions/metrics to Weave. Metrics are computed locally without this.
weave = ["weave>=0.51.44"]
# Optional: (re)generate the HuggingFace task datasets from raw recorded runs.
generate = ["gptnt-experiments", "wandb[media]>=0.19.9,<0.22.1"]

[project.scripts]
gptnt-statics = "gptnt.statics.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/gptnt"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
