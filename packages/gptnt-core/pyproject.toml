[project]
name = "gptnt-core"
version = "1.0.0"
description = "GPTNT shared kernel: KTANE domain model, player abstraction, processors, prompts."
requires-python = ">=3.13, <3.14"
dependencies = [
    "anyio>=4.9.0",
    "color-contrast>=0.1.1",
    "httpx>=0.28.1",
    "hydra-core>=1.3.2",
    "json-repair>=0.52.0",
    "logfire>=3.14.0",
    "omegaconf>=2.3.0",
    "opencv-python-headless>=4.11.0.86",
    "orjson>=3.11.5",
    "pillow>=11.1.0",
    "pybase64>=1.4.3",
    "pydantic>=2.10.6",
    "pydantic-ai>=1.67.0",
    "rich>=13.9.4",
    "scikit-image>=0.25.2",
    "structlog>=25.1.0",
    "tiktoken>=0.9.0",
    "typer>=0.15.1",
    "unflatten>=0.2.0",
    "whenever>=0.7.3",
]

[tool.hatch.build.targets.wheel]
packages = ["src/gptnt"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
