[project]
name = "gptnt-cli"
version = "1.0.0"
description = "GPTNT unified command-line entrypoint: assembles every package's CLI under `gptnt`."
requires-python = ">=3.13, <3.14"
dependencies = [
    "gptnt-core",
    "gptnt-records",
    "gptnt-statics",
    "gptnt-app",
    "gptnt-interactive",
]

[project.optional-dependencies]
# Surface the wandb-backed records/interactive commands when installed with the extra.
wandb = ["gptnt-records[wandb]", "gptnt-interactive[wandb]"]

[project.scripts]
gptnt = "gptnt.cli.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/gptnt"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
