[dependency-groups]
tests = [
    "hypothesis>=6.131.0",
    "pytest>=8.3.4",
    "pytest-cases>=3.8.6",
    "pytest-cov>=6.1.0",
    "pytest-mock>=3.14.0",
    "pytest-sugar>=1.0.0",
    "pytest-xdist>=3.6.1",
    "fakeredis>=2.30.1",
    "asgi-lifespan>=2.1.0",
    "respx>=0.22.0",
    "pytest-factoryboy>=2.8.1",
    "deepdiff>=8.4.2",
    "unflatten>=0.2.0",
    "pytest-env>=1.6.0",
]
lint = [
    "basedpyright>=1.29.2",
    "docformatter>=1.7.5",
    "flake8-pyproject>=1.2.3",
    "import-linter>=2.0",
    "prek>=0.2.23",
    "ruff>=0.9.0",
    "toml-sort>=0.24.2",
    "wemake-python-styleguide>=1.0.0",
]
visualisation = [
    "pymupdf>=1.26.6",
    "streamlit-drawable-canvas>=0.9.3",
]
# Dev/CI only: keeps W&B installed so the optional W&B modules type-check and run locally.
# Runtime W&B support ships as the gptnt-records[wandb] / gptnt-interactive[wandb] extras.
wandb = [
    "wandb[media]>=0.19.9,<0.22.1",
]

[tool.uv]
override-dependencies = ["streamlit>=1.40.0"]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = [
    {index = "pytorch-cpu"},
]
gptnt-core = {workspace = true}
gptnt-records = {workspace = true}
gptnt-statics = {workspace = true}
gptnt-interactive = {workspace = true}
gptnt-app = {workspace = true}
gptnt-cli = {workspace = true}

[tool.uv.workspace]
members = ["packages/*"]

[tool.basedpyright]
verboseOutput = true
typeCheckingMode = "recommended"
reportAny = false
reportExplicitAny = false
reportImplicitOverride = true
reportIncompatibleMethodOverride = true
reportMissingSuperCall = true
reportMissingTypeStubs = false
reportUnannotatedClassAttribute = false
reportUnknownArgumentType = false
reportUnknownLambdaType = false
reportUnknownMemberType = false
reportUnknownParameterType = false
reportUnknownVariableType = false
reportUntypedFunctionDecorator = false
# Covered by ruff
reportDeprecated = false
reportImplicitStringConcatenation = false
reportMissingParameterType = false
reportPrivateImportUsage = false
reportPrivateUsage = false
reportUnusedImport = false
reportUnusedParameter = false
reportUnusedVariable = false
extraPaths = [
    "packages/gptnt-core/src",
    "packages/gptnt-records/src",
    "packages/gptnt-statics/src",
    "packages/gptnt-interactive/src",
    "packages/gptnt-app/src",
    "packages/gptnt-cli/src",
]
executionEnvironments = [
    {root = "tests", extraPaths = ["."], reportArgumentType = false},
]
ignore = ["scripts", "scrap", "stats", "storage", "wandb", "configs"]

[tool.codespell]
# Ref: https://github.com/codespell-project/codespell#using-a-config-file
skip = '.git*,*.svg,*.lock,*.css,*.yaml,*.json'
check-hidden = true
# Ignore "formatting" like **L**anguage
ignore-regex = '\*\*[A-Z]\*\*[a-z]+\b'
ignore-words-list = 'som'

# https://coverage.readthedocs.io/en/latest/config.html#report
[tool.coverage.report]
skip_covered = true
show_missing = true
ignore_errors = true
precision = 2
exclude_lines = [
    # `# pragma: no cover` is standard marker for code that's not covered, this will error if code is covered
    'pragma: no cover',
    # use `# pragma: lax no cover` if you want to ignore cases where (some of) the code is covered
    'pragma: lax no cover',
    'raise NotImplementedError',
    'if TYPE_CHECKING:',
    'if typing.TYPE_CHECKING:',
    '@overload',
    '@deprecated',
    '@typing.overload',
    '@abstractmethod',
    '\(Protocol\):$',
    'typing.assert_never',
    '$\s*assert_never\(',
    'if __name__ == .__main__.:',
    'except ImportError as _import_error:',
    '$\s*pass$',
    'assert False',
    '@pytest\.mark\.skip',
    '@pytest\.mark\.xfail',
]

# https://coverage.readthedocs.io/en/latest/config.html#run
[tool.coverage.run]
patch = ["subprocess"]
concurrency = ["multiprocessing", "thread"]
# We use a subdirectory for coverage data to avoid noisy coverage data files.
data_file = ".coverage/.coverage"
# required to avoid warnings about files created by create_module fixture
include = [
    "packages/**/*.py",
    "tests/**/*.py",
]
# Disable include-ignored warnings as --source is enabled automatically causing a self conflict as
# per:
# https://github.com/pytest-dev/pytest-cov/issues/532
# https://github.com/pytest-dev/pytest-cov/issues/369
# This prevents coverage being generated by pytest-cov which has direct editor support in VS Code,
# making it super useful to check coverage while writing tests.
disable_warnings = ["include-ignored"]

[tool.flake8]
extend-exclude = [".venv"]
extend-ignore = [
    # basedpyright checks for unused variables
    "WPS122",
    # WPS struggles with pydantic models
    "WPS601",
    # I disagree with WPS114
    "WPS114",
    # f-strings are the way, this is just it now
    "WPS237",
    # Imports happen. That's fine
    "WPS201",
    # Allow init logic because makes importing easier
    "WPS412",
    # Handled by ruff PLR2004
    "WPS432",
    # Free the walrus
    "WPS332",
    # I disagree with demanding the use of dict.get()
    "WPS529",
    # I disagree with the limits on slicing?
    "WPS478",
    # Unfortunately, we can't control what other people name things
    "WPS347",
    # Module complexity doesnt seem to work consistently, so we can just disable it
    "WPS232",
    # Ruff handles it with PLC0415
    "WPS433",
]
per-file-ignores = [
    "scripts/*:WPS",
    "tests/*:WPS110,WPS2,WPS118,WPS432,WPS435,WPS444,WPS476,WPS411",
    "packages/**/cli/*:WPS211,WPS213,WPS238,WPS407",
    "packages/gptnt-interactive/src/gptnt/interactive/__main__.py:WPS213",
    "packages/gptnt-core/src/gptnt/core/ktane/state/*:WPS202,WPS226",
    "packages/gptnt-core/src/gptnt/core/processors/*:WPS203",
    "packages/gptnt-statics/src/gptnt/statics/generation/*:WPS202,WPS204,WPS226",
    "packages/gptnt-records/src/gptnt/records/duckdb.py:WPS110,WPS111,WPS430",
    "packages/gptnt-core/src/gptnt/core/players/tokens.py:WPS402",
]
select = ["WPS"]
max-line-length = 99
nested-classes-whitelist = ["Meta", "Params", "Config"]
allowed-domain-names = ["data", "params", "content"]
# WPS211: Increase number of arguments allowed for a function
max-arguments = 10
# WPS214: Increase number of methods allowed for a class
max-methods = 25
# WPS235: Increase number of imports allowed from a module
max-import-from-members = 10
# WPS226: Increase number of string literals allowed before wemake complains
max-string-usages = 14
# WPS234: Increase max annotation complexity
max-annotation-complexity = 5
# WPS221: Increase max jones compexity
max-line-complexity = 18
# WPS202: Increase max module members
max-module-members = 15
# WPS210: Increase max number of variables in a function
max-local-variables = 10
# WPS217: increase max number of awaitable
max-awaits = 10
# WPS204: Increase overused expression limit in a module
max-module-expressions = 10

[tool.importlinter]
root_packages = [
    "gptnt.core",
    "gptnt.records",
    "gptnt.statics",
    "gptnt.app",
    "gptnt.interactive",
    "gptnt.cli",
]

[[tool.importlinter.contracts]]
name = "core is the base layer (imports no other gptnt package)"
type = "forbidden"
source_modules = ["gptnt.core"]
forbidden_modules = [
    "gptnt.records",
    "gptnt.statics",
    "gptnt.app",
    "gptnt.interactive",
    "gptnt.cli",
]

[[tool.importlinter.contracts]]
name = "records depends only on core"
type = "forbidden"
source_modules = ["gptnt.records"]
forbidden_modules = ["gptnt.statics", "gptnt.app", "gptnt.interactive", "gptnt.cli"]

[[tool.importlinter.contracts]]
name = "statics generation only depends on core and records"
type = "forbidden"
source_modules = ["gptnt.statics"]
forbidden_modules = ["gptnt.app", "gptnt.interactive", "gptnt.cli"]

[[tool.importlinter.contracts]]
name = "app only depends on core and records"
type = "forbidden"
source_modules = ["gptnt.app"]
forbidden_modules = ["gptnt.statics", "gptnt.interactive", "gptnt.cli"]

[[tool.importlinter.contracts]]
name = "interactive depends only on core and records"
type = "forbidden"
source_modules = ["gptnt.interactive"]
forbidden_modules = ["gptnt.statics", "gptnt.app", "gptnt.cli"]

[[tool.importlinter.contracts]]
name = "nothing imports gptnt.cli (it is the top-level assembler)"
type = "forbidden"
source_modules = [
    "gptnt.core",
    "gptnt.records",
    "gptnt.statics",
    "gptnt.app",
    "gptnt.interactive",
]
forbidden_modules = ["gptnt.cli"]

[tool.logfire]
pydantic_plugin_record = "failure"
ignore_no_config = true

[tool.pytest.ini_options]
filterwarnings = [
    "ignore::UserWarning",
    'ignore:Deprecated call to `pkg_resources.declare_namespace:DeprecationWarning',
]
asyncio_default_fixture_loop_scope = "function"
markers = [
    "integration: in-situ integration test (fake Redis + fake game; no external infra needed)",
    "slow: slower test, kept out of the quick feedback loop",
    "requires_game: needs the real KTANE binary + a display; skipped in CI",
]

[tool.pytest_env]
HEARTBEAT_REPEAT_INTERVAL = "0.1"
HEARTBEAT_CHECK_INTERVAL = "0.1"
HEARTBEAT_EXPIRATION = "5"
GAME_STATE_INTERVAL = "0.1"
SESSION_STATE_WATCHER_INTERVAL = "0.1"
UPDATE_METRICS_INTERVAL = "0.5"
DEBUG = "true"
WEAVE_DISABLED = "true"
WANDB_MODE = "disabled"

[tool.ruff]
line-length = 99
target-version = "py313"
unsafe-fixes = true
src = [
    "packages/gptnt-core/src",
    "packages/gptnt-records/src",
    "packages/gptnt-statics/src",
    "packages/gptnt-interactive/src",
    "packages/gptnt-app/src",
    "packages/gptnt-cli/src",
]
force-exclude = true

[tool.ruff.format]
docstring-code-format = true
skip-magic-trailing-comma = true

[tool.ruff.lint]
# Enable every possible rule
select = ["ALL"]
external = ["WPS"]
ignore = [
    # Don't ask for docstring at top of module --- put it in the functions/classes
    "D100",
    # Do not check for docstring within __init__ method
    "D107",
    # Don't ask about line length, Black recommends using bugbear B950 instead
    "E501",
    # Allow import to be uppercase, because torch.nn.functional as F
    "N812",
    # Allow asserts to be used because they're just convenient for type-narrowing. Type-narrowing
    # is more important than the possibility that someone is running python with -O (in optimized
    # mode).
    # https://stackoverflow.com/a/68429294
    "S101",
    # Do not enforce annotations for self, cls, or similar
    "ANN1",
    # Do not block using 'Any' type since it happens
    "ANN401",
    # Let Black handle commas
    "COM",
    # Let logging use f-strings
    "G004",
    # Disable 'flake8-errmsg' because we assume users of this project can read tracebacks
    "EM",
    # Allow TODO comments
    "FIX002",
    # Allow assigning variables before returning them
    "RET504",
    # Don't care about requiring an author name or issue link for a todo
    "TD002",
    "TD003",
    # Disable flagging commented-out code because it's false-positives on shape comments
    "ERA001",
    # Words in exceptions are fine.
    "TRY003",
    # we are not doing cryptography here
    "S311",
    # Things to ignore because ruff's formatter says so
    # https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
    "D206",
    "D300",
    "E111",
    "E114",
    "E117",
    "ISC001",
    "ISC002",
    "Q000",
    "Q001",
    "Q002",
    "Q003",
    "W191",
]
unfixable = [
    # Do not remove unused variables
    "F841",
    # Do not auto-remove commented out code
    "ERA001",
]

[tool.ruff.lint.flake8-quotes]
inline-quotes = "double"

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-type-checking]
exempt-modules = ["typing", "typing_extensions", "pydantic_numpy"]
runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
    "pydantic.generics.GenericModel",
]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["gptnt"]
split-on-trailing-comma = false
forced-separate = ["tests"]

[tool.ruff.lint.mccabe]
max-complexity = 18

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["D", "F401", "I002"]
"**/tests/*" = ["D", "S101", "INP001", "PLR2004", "FBT001", "SLF001", "ANN001"]
"scripts/*" = ["INP001", "D", "ANN", "PLR", "PD", "S"]
"scrap/*" = ["T201"]
"packages/gptnt-statics/src/gptnt/statics/generation/defuser_vqa/*" = ["S311"] # Allow standard random for dataset generation
"packages/gptnt-core/src/gptnt/core/players/tokens.py" = ["PLR2004"]
# CLI commands keep heavy deps inside functions to keep `--help` fast (PLC0415), and Typer needs
# the command signature annotations available at runtime, so the option-type/Path imports can't be
# hidden in a TYPE_CHECKING block (TC001/TC002/TC003).
"packages/**/cli/*" = ["PLC0415", "TC001", "TC002", "TC003"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.pylint]
max-args = 20

[tool.tomlsort]
sort_first = ["project", "dependency-groups", "tool"]
spaces_indent_inline_array = 4 # Matching editorconfig
trailing_comma_inline_array = true
overrides."project".first = [
    "name",
    "version",
    "description",
    "authors",
    "license",
    "readme",
    "requires-python",
]
overrides."tool".first = ["uv"]
