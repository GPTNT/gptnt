name: CI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  changes:
    name: Check for file changes
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      pull-requests: read
      contents: read
    outputs:
      deps: ${{steps.filter.outputs.deps}}
      ci: ${{steps.filter.outputs.ci}}
      python: ${{steps.filter.outputs.python}}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          # Full history so paths-filter can diff against the push `before` SHA
          # locally instead of an authenticated fetch (which fails under
          # persist-credentials: false on push-to-main).
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            deps: &deps-files
              - 'pyproject.toml'
              - 'uv.lock'
            ci: &ci-files
              - '.github/workflows/ci.yaml'
            python:
              - *deps-files
              - *ci-files
              - '**/*.py'

  check_pre_commit:
    name: Check pre-commit
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached prek environment
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: prek-cache
        with:
          path: ~/.cache/prek
          key: ${{ runner.os }}-prek-${{ hashFiles('**/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-prek-

      - name: Install deps
        run: uv sync --all-groups --extra submission

      - name: Run prek hook
        id: run-prek-hooks
        run: |
          git add .pre-commit-config.yaml
          uv run prek run --color=always --all-files

      - name: Annotate any changes using reviewdog
        if: ${{ failure() }}
        id: reviewdog-suggester
        uses: reviewdog/action-suggester@2558ba17e65a9039e73764a73009fc05fef28a46 # v1.24.3
        with:
          tool_name: prek

      - name: Save prek cache
        if: ${{ always() }}
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/prek
          key: ${{ runner.os }}-prek-${{ hashFiles('**/.pre-commit-config.yaml') }}

  test:
    name: Run pytest
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{needs.changes.outputs.python == 'true' && !github.event.pull_request.draft }}

    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --all-groups --extra submission

      - name: Run tests
        env:
          COVERAGE_CORE: sysmon
        run: |
          uv run pytest -k "not requires_game and not slow" --junitxml=pytest.xml --cov-report "xml:coverage.xml" --cov=src -n auto

      - name: Comment coverage
        if: ${{ github.event_name == 'pull_request' }}
        uses: MishaKav/pytest-coverage-comment@dd5b80bde6d16941f336518e92929e89069d8451 # v1.7.2
        with:
          pytest-xml-coverage-path: ./coverage.xml
          junitxml-path: ./pytest.xml
          report-only-changed-files: true

  test_slow:
    name: Run slow tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{needs.changes.outputs.python == 'true' && !github.event.pull_request.draft }}
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --all-groups --extra submission

      # Runs in parallel with `test`, so enabling the slow suite costs max(fast, slow)
      - name: Run slow tests
        run: |
          uv run pytest -m slow -k "not requires_game" -n auto
