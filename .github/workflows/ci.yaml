name: CI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  changes:
    name: Check for file changes
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      pull-requests: read
      contents: read
    outputs:
      deps: ${{steps.filter.outputs.deps}}
      ci: ${{steps.filter.outputs.ci}}
      python: ${{steps.filter.outputs.python}}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deps: &deps-files
              - 'pyproject.toml'
              - 'uv.lock'
            ci: &ci-files
              - '.github/workflows/ci.yaml'
            python:
              - *deps-files
              - *ci-files
              - '**/*.py'

  check_pre_commit:
    name: Check pre-commit
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached prek environment
        uses: actions/cache/restore@v4
        id: prek-cache
        with:
          path: ~/.cache/prek
          key: ${{ runner.os }}-prek-${{ hashFiles('**/.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-prek-

      - name: Install deps
        run: uv sync --all-groups

      - name: Run prek hook
        id: run-prek-hooks
        run: |
          git add .pre-commit-config.yaml
          uv run prek run --color=always --all-files

      - name: Annotate any changes using reviewdog
        if: ${{ failure() }}
        id: reviewdog-suggester
        uses: reviewdog/action-suggester@v1
        with:
          tool_name: prek

      - name: Save prek cache
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/prek
          key: ${{ runner.os }}-prek-${{ hashFiles('**/.pre-commit-config.yaml') }}

  test:
    name: Run pytest
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{needs.changes.outputs.python == 'true' && !github.event.pull_request.draft }}

    permissions:
      contents: write
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --group tests

      - name: Run tests
        run: |
          uv run pytest -k "not requires_game" --junitxml=pytest.xml --cov-report "xml:coverage.xml" --cov=src -n 2

      - name: Comment coverage
        if: ${{ github.event_name == 'pull_request' }}
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-xml-coverage-path: ./coverage.xml
          junitxml-path: ./pytest.xml
          report-only-changed-files: true
